<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <form action="" method="GET">
            <h2>Login</h2>
            <label for="username">Username</label>
            <input type="text" id="username" class="username" placeholder="Enter your username">
            <label for="">Password</label>
            <input type="password" id="password" class="password" placeholder="Enter your password">
            <input type="checkbox" name="remember" id="remember">
            <label for="remember">Remember me</label>
            <input type="submit" name="login-btn" id="login-btn" value="Login">
        </form>
    </div>
    
</body>
</html>
